name: Validation HTML

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validation HTML
        uses: nicework-company/html-validate-action@v1
        with:
          files: "*.html"
